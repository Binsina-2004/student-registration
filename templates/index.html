<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
</head>
<body>

<div class="container">

    <h2>STUDENT REGISTRATION FORM </h2>

    <form action="/save" method="post">

        <div class="row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text"
                       name="name"
                       placeholder="Enter Full Name"
                       pattern="[A-Za-z ]+"
                       title="Only letters are allowed"
                       required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>

                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date"
                       name="dob"
                       required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number"
                       name="age"
                       min="1"
                       max="100"
                       required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Father Name</label>
                <input type="text"
                       name="father"
                       placeholder="your father name"
                       pattern="[A-Za-z ]+"
                       title="Only letters are allowed"
                       required>
            </div>

            <div class="form-group">
                <label>Mother Name</label>
                <input type="text"
                       name="mother"
                       placeholder="your mother name"
                       pattern="[A-Za-z ]+"
                       title="Only letters are allowed"
                       required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text"
                       name="mobile"
                       maxlength="10"
                       pattern="[0-9]{10}"
                       title="Enter a 10 digit mobile number"
                       placeholder="enter the valid mobile number"
                       required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                       name="email"
                       placeholder="student@gmail.com"
                       required>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address"
                      placeholder="Enter your valid Address"
                      required></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>City</label>
                <input type="text"
                       name="city"
                       placeholder="Enter the city"
                       pattern="[A-Za-z ]+"
                       required>
            </div>

            <div class="form-group">
                <label>State</label>
                <input type="text"
                       name="state"
                       placeholder="Enter the state"
                       pattern="[A-Za-z ]+"
                       required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Course</label>
                <input type="text"
                       name="course"
                       placeholder="Enter your Course"
                       required>
            </div>

            <div class="form-group">
                <label>Admission Date</label>
                <input type="date"
                       name="admissiondate"
                       required>
            </div>
        </div>

        <div style="text-align:center; margin-top:20px;">

            <button type="submit" class="btn btn-register">
                Register Student
            </button>

            <a href="/view">
                <button type="button" class="btn btn-view">
                    View Students
                </button>
            </a>

        </div>

    </form>

</div>

</body>
</html>
